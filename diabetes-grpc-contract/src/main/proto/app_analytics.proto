syntax = "proto3";

option java_package = "edu.rutmiit.demo.grpc";

option java_multiple_files = true;

package appanalytics;

service AppAnalytics {
    rpc AnalyzeApp (AnalyzeAppRequest) returns (AppAnalysisResponse);
}

message AnalyzeAppRequest {
    int64  app_id         = 1;
    float  bloodSugar     = 2;
    bool onDiet        = 3;
    bool fasting       = 4;
}

message AppAnalysisResponse {
    int64  app_id    = 1;
    string diagnosis = 2;
}